# Ping mwm-staging Supabase so the free-tier project does not pause after 7 days idle.
# Secret-free — public health endpoint only (honors no-GitHub-secrets policy).

name: Staging keep-alive

on:
  schedule:
    # Every 3 days at 12:00 UTC
    - cron: '0 12 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Supabase staging health check
        run: |
          set -euo pipefail
          url="https://cmzyxpxfyvdvbsykjvsg.supabase.co/auth/v1/health"
          code="$(curl -sS -o /dev/null -w '%{http_code}' "$url")"
          echo "GET $url → HTTP $code"
          test "$code" = "200" -o "$code" = "401"
