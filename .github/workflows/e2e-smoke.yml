# Uses STAGING Supabase only (cmzyxpxfyvdvbsykjvsg). Production credentials must
# never be added to GitHub Actions secrets. See ENVIRONMENT_TESTING.md.

name: e2e-smoke

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REQUIRE_PRIVILEGED_MFA: 'false'
  PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000

jobs:
  e2e-prepare:
    if: vars.E2E_SMOKE_IN_CI == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PLAYWRIGHT_HOUSEHOLD_ID: ${{ secrets.PLAYWRIGHT_HOUSEHOLD_ID }}
      PLAYWRIGHT_CONSUMER_EMAIL: ${{ secrets.PLAYWRIGHT_CONSUMER_EMAIL }}
      PLAYWRIGHT_CONSUMER_PASSWORD: ${{ secrets.PLAYWRIGHT_CONSUMER_PASSWORD }}
      PLAYWRIGHT_ADVISOR_EMAIL: ${{ secrets.PLAYWRIGHT_ADVISOR_EMAIL }}
      PLAYWRIGHT_ADVISOR_PASSWORD: ${{ secrets.PLAYWRIGHT_ADVISOR_PASSWORD }}
      PLAYWRIGHT_ADVISOR_CLIENT_HOUSEHOLD_ID: ${{ secrets.PLAYWRIGHT_ADVISOR_CLIENT_HOUSEHOLD_ID }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Prepare staging env files
        run: bash scripts/write-ci-staging-env.sh

      - name: Seed tier-restructure persona matrix on staging
        run: npm run seed:e2e:persona-matrix

      - name: Reconcile E2E household IDs after seed
        run: npx tsx scripts/append-ci-e2e-household-ids.ts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
          RESEND_API_KEY: re_placeholder_ci_build_only
          STRIPE_SECRET_KEY: sk_test_placeholder_ci_build_only

      # Mint after build so the access-token TTL clock starts as late as possible.
      - name: Mint shared auth sessions (sequential, single login per identity)
        run: bash scripts/mint-ci-e2e-auth.sh
        env:
          TEST_ENV: local

      - name: Guard auth TTL for parallel fan-out
        run: |
          set -euo pipefail
          node scripts/assert-auth-ttl.mjs .auth/consumer-link.json 1800
          node scripts/assert-auth-ttl.mjs .auth/advisor-empty.json 1800
          for suite in go-live-profile security-smoke b4-gate security-isolation; do
            node scripts/assert-auth-ttl.mjs ".auth/consumer.${suite}.json" 1800
            if [[ "$suite" != "go-live-profile" ]]; then
              node scripts/assert-auth-ttl.mjs ".auth/advisor.${suite}.json" 1800
            fi
          done

      - name: Stage CI E2E prepare artifact
        run: |
          set -euo pipefail
          test -d .next
          test -f .env.local
          test -f .env.test.local
          test -d .auth
          test -f .auth/consumer-link.json
          test -f .auth/advisor-empty.json
          test -f .auth/advisor.json
          for suite in go-live-profile security-smoke b4-gate security-isolation; do
            test -f ".auth/consumer.${suite}.json"
            if [[ "$suite" != "go-live-profile" ]]; then
              test -f ".auth/advisor.${suite}.json"
            fi
          done
          tar -czf e2e-smoke-prepare.tar.gz .next .env.local .env.test.local .auth

      - name: Upload CI E2E prepare artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-prepare
          path: e2e-smoke-prepare.tar.gz
          if-no-files-found: error
          retention-days: 1

  e2e-go-live-profile:
    if: vars.E2E_SMOKE_IN_CI == 'true'
    needs: e2e-prepare
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Download CI E2E prepare artifact
        uses: actions/download-artifact@v4
        with:
          name: e2e-smoke-prepare

      - name: Restore CI E2E prepare artifact
        run: tar -xzf e2e-smoke-prepare.tar.gz

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E go-live profile smoke
        run: npm run test:e2e:go-live-profile -- --workers=1
        env:
          E2E_REUSE_AUTH: '1'
          E2E_SUITE: go-live-profile

  e2e-security-smoke:
    if: vars.E2E_SMOKE_IN_CI == 'true'
    needs: e2e-prepare
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Download CI E2E prepare artifact
        uses: actions/download-artifact@v4
        with:
          name: e2e-smoke-prepare

      - name: Restore CI E2E prepare artifact
        run: tar -xzf e2e-smoke-prepare.tar.gz

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E security smoke
        run: npm run test:e2e:security-smoke:ci -- --workers=1
        env:
          E2E_REUSE_AUTH: '1'
          E2E_SUITE: security-smoke

  e2e-b4-gate:
    if: vars.E2E_SMOKE_IN_CI == 'true'
    needs: e2e-prepare
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Download CI E2E prepare artifact
        uses: actions/download-artifact@v4
        with:
          name: e2e-smoke-prepare

      - name: Restore CI E2E prepare artifact
        run: tar -xzf e2e-smoke-prepare.tar.gz

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E B4 gate (prospect, health-score, playbook, drip)
        run: npm run test:e2e:b4-gate:ci -- --workers=1
        env:
          E2E_REUSE_AUTH: '1'
          E2E_SUITE: b4-gate

  e2e-security-isolation:
    if: vars.E2E_SMOKE_IN_CI == 'true'
    needs: e2e-prepare
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Download CI E2E prepare artifact
        uses: actions/download-artifact@v4
        with:
          name: e2e-smoke-prepare

      - name: Restore CI E2E prepare artifact
        run: tar -xzf e2e-smoke-prepare.tar.gz

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E cross-household isolation (IDOR matrix)
        run: npm run test:e2e:security-isolation:ci -- --workers=1
        env:
          E2E_REUSE_AUTH: '1'
          E2E_SUITE: security-isolation

  # Aggregator preserves branch-protection check name `e2e-smoke` while suites run in parallel.
  e2e-smoke:
    if: always() && vars.E2E_SMOKE_IN_CI == 'true'
    needs:
      - e2e-prepare
      - e2e-go-live-profile
      - e2e-security-smoke
      - e2e-b4-gate
      - e2e-security-isolation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Require all E2E smoke suites passed
        run: |
          set -euo pipefail
          fail=0
          check() {
            local name="$1" result="$2"
            if [[ "$result" != "success" ]]; then
              echo "::error title=E2E smoke suite failed::$name result=$result"
              fail=1
            fi
          }
          check "e2e-prepare" "${{ needs.e2e-prepare.result }}"
          check "e2e-go-live-profile" "${{ needs.e2e-go-live-profile.result }}"
          check "e2e-security-smoke" "${{ needs.e2e-security-smoke.result }}"
          check "e2e-b4-gate" "${{ needs.e2e-b4-gate.result }}"
          check "e2e-security-isolation" "${{ needs.e2e-security-isolation.result }}"
          exit "$fail"
