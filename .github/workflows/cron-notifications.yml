name: Daily Notifications Cron

on:
  workflow_dispatch:  # manual trigger only — Vercel cron handles the schedule

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger notification cron
        run: |
          curl -X GET https://estate-planner-gules.vercel.app/api/cron/notifications \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -f \
            --silent \
            --show-error
