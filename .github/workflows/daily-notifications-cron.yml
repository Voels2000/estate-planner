name: Daily Notifications Cron

on:
  schedule:
    - cron: '0 14 * * *' # Daily at 14:00 UTC (10am EST / 7am PST)
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger notification cron
        run: |
          curl -X GET https://mywealthmaps.com/api/cron/notifications \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -f \
            --silent \
            --show-error
