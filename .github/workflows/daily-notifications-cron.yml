name: Daily Notifications Cron

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger notification cron
        run: |
          curl -X GET https://estate-planner-git-main-voels2000s-projects.vercel.app/api/cron/notifications \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -f \
            --silent \
            --show-error
