name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, staging]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Stripe date/period guard
        run: npm run lint:stripe-dates

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests (import-unit project)
        run: npm run test:unit

      - name: Staging-first gate (PRs to main)
        if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main' && github.head_ref != 'staging'
        run: |
          echo "::error::PRs to main must use head branch staging. Merge to staging first, then open staging → main promotion. See docs/DEPLOYMENT.md § Branch flow."
          exit 1

      - name: Production build
        if: github.event_name == 'push' || github.event.pull_request.base.ref == 'main'
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          RESEND_API_KEY: re_placeholder_ci_build_only
          STRIPE_SECRET_KEY: sk_test_placeholder_ci_build_only

      - name: Security audit script
        if: github.event_name == 'push' || github.event.pull_request.base.ref == 'main'
        run: bash scripts/security-audit.sh

      - name: UX language audit
        if: github.event_name == 'push' || github.event.pull_request.base.ref == 'main'
        run: bash scripts/audit-ux-language.sh

      - name: Event upgrade copy verify
        if: github.event_name == 'push' || github.event.pull_request.base.ref == 'main'
        run: npx tsx scripts/verify-event-upgrade-copy.ts

      - name: App route slug validation
        if: github.event_name == 'push' || github.event.pull_request.base.ref == 'main'
        run: npx tsx scripts/verify-app-route-slugs.ts

      - name: Consumer OpenAPI contract
        if: github.event_name == 'push' || github.event.pull_request.base.ref == 'main'
        run: npm run verify:consumer-openapi
