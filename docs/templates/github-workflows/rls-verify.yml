name: RLS verify

# TEMPLATE — mirrors .github/workflows/rls-verify.yml (staging Supabase only).
# See docs/templates/github-workflows/README.md

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  rls-verify:
    if: vars.RLS_VERIFY_IN_CI == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      PLAYWRIGHT_CONSUMER_EMAIL: ${{ secrets.PLAYWRIGHT_CONSUMER_EMAIL }}
      PLAYWRIGHT_CONSUMER_PASSWORD: ${{ secrets.PLAYWRIGHT_CONSUMER_PASSWORD }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Prepare staging env files
        run: bash scripts/write-ci-staging-env.sh

      - name: RLS verify (JWT isolation + structural coverage gate)
        run: npm run verify:rls -- --require-sql
