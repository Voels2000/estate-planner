name: Daily Notifications Cron

# TEMPLATE ONLY — Vercel cron handles production schedule; this needed CRON_SECRET in GitHub.

on:
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger notification cron
        run: |
          curl -X GET https://estate-planner-gules.vercel.app/api/cron/notifications \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -f \
            --silent \
            --show-error
